# homeserver.template.yaml
# Placeholders replaced by entrypoint.sh:
#   __ONION_ADDRESS__  → the .onion hostname (e.g. abc123xyz.onion)
#   __REGISTRATION_SECRET__  → random secret generated at first boot

server_name: "__ONION_ADDRESS__"
pid_file: /data/homeserver.pid

# Only listen on the Docker-internal interface, never on host
listeners:
  - port: 8008
    bind_addresses:
      - "0.0.0.0"       # Reachable within the Docker network only
    type: http
    tls: false           # TLS terminated by Tor — no need here
    x_forwarded: false
    resources:
      - names: [client, federation]
        compress: false

# Data paths
database:
  name: sqlite3
  args:
    database: /data/homeserver.db

log_config: /data/log.config
media_store_path: /data/media_store

# Registration
enable_registration: false
registration_shared_secret: "__REGISTRATION_SECRET__"

# Federation — disabled: Synapse must not attempt DNS lookups
# Users can only communicate within this homeserver
federation_domain_whitelist: []
allow_public_rooms_over_federation: false
federation_verify_certificates: false   # Irrelevant but safe default

# Explicitly block outbound federation by routing through nothing
# (the Docker network has no external routing anyway)
# Additional hardening:
suppress_key_server_warning: true
trusted_key_servers: []

# Reporting / telemetry — disabled
report_stats: false

# Signing key (auto-generated by --generate-config)
signing_key_path: /data/signing.key

# Macaroon secret (auto-generated)
macaroon_secret_key: "__MACAROON_SECRET__"
form_secret: "__FORM_SECRET__"
