
networks:
  matrix-internal:
    driver: bridge
    internal: true  # No external routing — Synapse fully isolated
  tor-external:
    driver: bridge   # Tor needs internet to reach the Tor network

volumes:
  synapse-data:
  tor-data:

services:

  tor:
    image: goldy/tor-hidden-service:latest
    container_name: whistor-tor-daemon
    restart: unless-stopped
    networks:
      - matrix-internal  # Reach synapse container
      - tor-external     # Reach the Tor network (internet)
    volumes:
      - tor-data:/var/lib/tor/hidden_service
    environment:
      # goldy/tor-hidden-service convention: {SERVICE_NAME}_PORTS=public_port:private_port
      # SERVICE_NAME in lowercase becomes the target hostname → synapse:8008
      SYNAPSE_PORTS: "8448:8008"
    depends_on:
      - synapse

  synapse:
    image: matrixdotorg/synapse:latest
    container_name: synapse-server
    restart: unless-stopped
    networks:
      - matrix-internal
    volumes:
      - synapse-data:/data
      - tor-data:/tor-hs:ro          # Read the .onion hostname at init
      - ./scripts/entrypoint.sh:/entrypoint-custom.sh:ro
      - ./config/homeserver.template.yaml:/config/homeserver.template.yaml:ro
    environment:
      SYNAPSE_CONFIG_PATH: /data/homeserver.yaml
    # Override default entrypoint to run our init logic first
    entrypoint: ["/bin/bash", "/entrypoint-custom.sh"]
    # Do NOT publish any ports to the host — Tor is the only ingress
